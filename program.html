<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cubs S&C — Training Program</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07090F;--card:#0E1220;--border:rgba(255,255,255,0.08);
  --text:#EEF2FF;--text2:#7A8BAD;--text3:#3D4F6B;
  --blue:#1D4ED8;--blue-l:#6BA3F8;--green-l:#4ADE80;
  --amber-l:#FCD34D;--purple-l:#A78BFA;
  --pair-A:#A78BFA;--pair-B:#34D399;--pair-C:#FCD34D;
  --pair-D:#F472B6;--pair-E:#60A5FA;--pair-F:#FB923C;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.topbar{background:rgba(7,9,15,0.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:10px;}
.badge{width:32px;height:32px;border-radius:7px;background:#0E3386;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(255,255,255,0.15);}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.05em;}
.brand-sub{font-size:9px;color:var(--text3);}
.ring-wrap{width:34px;height:34px;}
svg.ring{transform:rotate(-90deg);}
svg.ring circle{fill:none;stroke-width:3;}
.ring-track{stroke:rgba(255,255,255,0.08);}
.ring-fill{stroke:var(--blue-l);stroke-linecap:round;stroke-dasharray:88;stroke-dashoffset:88;transition:stroke-dashoffset .3s;}

.hero{background:linear-gradient(160deg,#0E3386 0%,#061640 55%,var(--bg) 100%);padding:20px 16px 24px;position:relative;}
.hero-date{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(107,163,248,.8);margin-bottom:6px;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;line-height:1;color:#fff;margin-bottom:2px;}
.hero-prog{font-size:13px;color:rgba(255,255,255,.6);}

.week-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90;}
.week-tabs::-webkit-scrollbar{display:none;}
.wtab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border);transition:all .15s;}
.wtab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.wtab.deload{border-color:rgba(252,211,77,.4);color:var(--amber-l);}

.day-grid{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.day-grid::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:8px 12px;border-radius:10px;text-align:center;cursor:pointer;min-width:60px;background:var(--card);border:1px solid var(--border);transition:all .15s;}
.day-btn.active{background:rgba(29,78,216,.2);border-color:rgba(107,163,248,.5);}
.day-btn.off{opacity:.3;cursor:default;}
.day-btn .dn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:2px;}
.day-btn .dl{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.day-btn.active .dn{color:var(--blue-l);}
.day-btn .dc{font-size:9px;color:var(--text3);margin-top:2px;}

.session{padding:12px 16px 90px;}
.block-wrap{margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.block-head{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
.block-icon{font-size:14px;}
.block-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.06em;flex:1;}
.block-cnt{font-size:10px;color:var(--text3);}
.lift-h{background:rgba(99,102,241,.15);} .lift-h .block-title{color:#a78bfa;}
.speed-h{background:rgba(245,158,11,.12);} .speed-h .block-title{color:#fcd34d;}
.mob-h{background:rgba(52,211,153,.1);} .mob-h .block-title{color:#34d399;}
.esd-h{background:rgba(96,165,250,.1);} .esd-h .block-title{color:#60a5fa;}
.prep-h{background:rgba(244,114,182,.1);} .prep-h .block-title{color:#f472b6;}

.ex-card{background:var(--card);border-bottom:1px solid var(--border);overflow:hidden;}
.ex-card:last-child{border-bottom:none;}
.ex-card[data-pair="A"]{border-left:3px solid var(--pair-A);}
.ex-card[data-pair="B"]{border-left:3px solid var(--pair-B);}
.ex-card[data-pair="C"]{border-left:3px solid var(--pair-C);}
.ex-card[data-pair="D"]{border-left:3px solid var(--pair-D);}
.ex-card[data-pair="E"]{border-left:3px solid var(--pair-E);}
.ex-card[data-pair="F"]{border-left:3px solid var(--pair-F);}

.ex-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;}
.ex-row:active{background:rgba(255,255,255,.03);}
.pair-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ex-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.02em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ex-presc{font-family:'DM Mono',monospace;font-size:11px;color:var(--blue-l);white-space:nowrap;flex-shrink:0;}
.chev{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .2s;}
.ex-card.open .chev{transform:rotate(90deg);}

.ex-detail{display:none;border-top:1px solid var(--border);}
.ex-card.open .ex-detail{display:block;}
.ex-inner{padding:12px 14px;}

.vid-wrap{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;position:relative;cursor:pointer;margin-bottom:10px;background:#000;}
.vid-wrap img{width:100%;height:100%;object-fit:cover;opacity:.85;}
.vid-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.vid-play div{width:48px;height:48px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,.3);}

.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.pill{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--border);}
.p-sets{background:rgba(29,78,216,.15);color:var(--blue-l);border-color:rgba(29,78,216,.25);}
.p-reps{background:rgba(29,78,216,.08);color:var(--blue-l);}
.p-load{background:rgba(217,119,6,.12);color:var(--amber-l);border-color:rgba(217,119,6,.2);}
.p-rest{background:rgba(22,163,74,.1);color:var(--green-l);border-color:rgba(22,163,74,.2);}
.p-tempo{background:rgba(167,139,250,.1);color:var(--purple-l);border-color:rgba(167,139,250,.2);}
.ex-note{font-size:11px;color:var(--text2);font-style:italic;margin-bottom:10px;line-height:1.5;}

.log-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.log-sets{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.log-set{display:flex;align-items:center;gap:8px;}
.set-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);width:16px;text-align:center;flex-shrink:0;}
.log-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1;}
.log-inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;text-align:center;width:100%;}
.log-inp:focus{outline:none;border-color:var(--blue-l);}
.log-inp::placeholder{color:var(--text3);}
.set-chk{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text3);transition:all .15s;}
.set-chk.done{background:rgba(22,163,74,.2);border-color:rgba(74,222,128,.4);color:var(--green-l);}

.why-btn{display:flex;align-items:center;gap:6px;width:100%;border:none;background:rgba(255,255,255,.02);padding:9px 14px;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;border-top:1px solid var(--border);}
.why-body{display:none;padding:10px 14px;background:rgba(255,255,255,.02);border-top:1px solid var(--border);}
.why-body.open{display:block;}
.why-mech{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:8px;}
.why-xfer{font-size:12px;color:#F0997B;line-height:1.7;padding:8px 10px;border-radius:6px;background:rgba(240,153,123,.06);border-left:2px solid rgba(240,153,123,.3);}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:rgba(7,9,15,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;gap:8px;}
.done-btn{flex:1;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--blue),#4F46E5);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.save-btn{padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}

.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--blue-l);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:80px 20px;color:var(--text3);}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:24px;text-align:center;color:#f87171;font-size:13px;margin:24px 16px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="badge">⚾</div>
    <div><div class="brand-name">CUBS S&C</div><div class="brand-sub">Training Program</div></div>
  </div>
  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 34 34" width="34" height="34">
      <circle class="ring-track" cx="17" cy="17" r="14"/>
      <circle class="ring-fill" id="ring" cx="17" cy="17" r="14"/>
    </svg>
  </div>
</div>

<div id="root"><div class="loading"><div class="spinner"></div><div>Loading…</div></div></div>

<script>
// ── Config ────────────────────────────────────────────────────
var SUPA_URL = 'https://umcdnbnvzwedrlidzaqg.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtY2RuYm52endlZHJsaWR6YXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjMwNjUsImV4cCI6MjA5MjYzOTA2NX0.g4t2GaT33M03b6-stee9Aiy2We1KdJpw5KVEKwScwJM';

var PROG = null, ENRICH = {}, LOG = {};
var STATE = { week: 0, day: 0 };
var PC = {A:'#A78BFA',B:'#34D399',C:'#FCD34D',D:'#F472B6',E:'#60A5FA',F:'#FB923C'};

// ── Helpers ────────────────────────────────────────────────────
function ytId(u){ var m=(u||'').match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/); return m?m[1]:''; }
function lk(wi,di,bi,ei,s){ return [wi,di,bi,ei,s].join('-'); }
function saveLog(){ try{ localStorage.setItem('log_'+PROG.id, JSON.stringify(LOG)); }catch(e){} }
function loadLog(){ try{ var s=localStorage.getItem('log_'+PROG.id); if(s) LOG=JSON.parse(s); }catch(e){} }

function countDone(wi,di){
  var day=PROG.weekData[wi].days[di], tot=0, done=0;
  (day.blocks||[]).forEach(function(b,bi){
    (b.exercises||[]).filter(function(e){return e.name;}).forEach(function(ex,ei){
      var sets=parseInt(ex.sets)||1;
      for(var s=0;s<sets;s++){ tot++; if((LOG[lk(wi,di,bi,ei,s)]||{}).done) done++; }
    });
  });
  return {tot:tot, done:done};
}

function updateRing(){
  var r=countDone(STATE.week, STATE.day);
  var pct=r.tot ? r.done/r.tot : 0;
  document.getElementById('ring').style.strokeDashoffset=(88-pct*88).toFixed(1);
}

// ── Prescription ───────────────────────────────────────────────
function prescStr(ex){
  var p=[];
  if(ex.sets) p.push(ex.sets+'×');
  if(ex.reps) p.push(ex.reps);
  if(ex.load) p.push(ex.load);
  if(ex.distance) p.push(ex.distance);
  if(ex.rest) p.push(ex.rest+' rest');
  return p.join(' ');
}
function prescPills(ex){
  var h='';
  if(ex.sets)     h+='<span class="pill p-sets">'+ex.sets+' sets</span>';
  if(ex.reps)     h+='<span class="pill p-reps">'+ex.reps+' reps</span>';
  if(ex.load)     h+='<span class="pill p-load">'+ex.load+'</span>';
  if(ex.distance) h+='<span class="pill p-load">'+ex.distance+'</span>';
  if(ex.tempo)    h+='<span class="pill p-tempo">'+ex.tempo+'</span>';
  if(ex.rest)     h+='<span class="pill p-rest">'+ex.rest+' rest</span>';
  return h;
}

// ── Block style ────────────────────────────────────────────────
function bh(bt){ return{speed:'speed-h',mobility:'mob-h',esd:'esd-h',prep:'prep-h'}[bt]||'lift-h'; }
function bi(bt){ return{speed:'⚡',mobility:'🧘',esd:'❤️',prep:'🔥'}[bt]||'🏋️'; }

// ── Render session ─────────────────────────────────────────────
function renderSession(){
  var wi=STATE.week, di=STATE.day;
  var day=PROG.weekData[wi].days[di];
  var html='';

  (day.blocks||[]).forEach(function(block,bi_){
    if(block.blockType==='session-header'){
      html+='<div style="text-align:center;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4ADE80;padding:10px 0 4px;">— '+block.label+' —</div>';
      return;
    }
    var exs=(block.exercises||[]).filter(function(e){return e.name;});
    if(!exs.length) return;

    html+='<div class="block-wrap"><div class="block-head '+bh(block.blockType)+'">'
      +'<span class="block-icon">'+bi(block.blockType)+'</span>'
      +'<span class="block-title">'+(block.label||block.blockType||'Block')+'</span>'
      +'<span class="block-cnt">'+exs.length+'</span>'
      +'</div>';

    exs.forEach(function(ex,ei){
      var enr=ENRICH[(ex.name||'').toLowerCase()]||{};
      var pair=ex.pair||'';
      var vid=ytId(ex.video||enr.video||'');
      var videoUrl=ex.video||enr.video||'';
      var sets=parseInt(ex.sets)||1;
      var id='ex-'+wi+'-'+di+'-'+bi_+'-'+ei;
      var hasWhy=enr.mechanism_text||(Array.isArray(enr.sport_transfer)&&enr.sport_transfer.find(function(t){return t.sport==='Baseball';}));

      html+='<div class="ex-card" id="'+id+'"'+(pair?' data-pair="'+pair+'"':'')+'>';

      // Collapsed row
      html+='<div class="ex-row" onclick="toggleEx(\''+id+'\')">';
      if(pair) html+='<div class="pair-dot" style="background:'+PC[pair]+';"></div>';
      html+='<div class="ex-name">'+ex.name+'</div>';
      html+='<div class="ex-presc">'+prescStr(ex)+'</div>';
      html+='<div class="chev">▶</div>';
      html+='</div>';

      // Expanded
      html+='<div class="ex-detail"><div class="ex-inner">';

      if(vid){
        html+='<div class="vid-wrap" onclick="window.open(\''+videoUrl+'\',\'_blank\')">'
          +'<img src="https://img.youtube.com/vi/'+vid+'/mqdefault.jpg" loading="lazy">'
          +'<div class="vid-play"><div>▶</div></div></div>';
      }

      var pp=prescPills(ex);
      if(pp) html+='<div class="pills">'+pp+'</div>';
      if(ex.notes) html+='<div class="ex-note">'+ex.notes+'</div>';

      // Set logger
      html+='<div class="log-label">Log sets</div><div class="log-sets">';
      for(var s=0;s<sets;s++){
        var k=lk(wi,di,bi_,ei,s);
        var entry=LOG[k]||{};
        html+='<div class="log-set">'
          +'<div class="set-n">'+(s+1)+'</div>'
          +'<div class="log-inputs">'
          +'<input class="log-inp" type="number" placeholder="lbs" value="'+(entry.weight||'')+'" oninput="logV(\''+k+'\',\'weight\',this.value)" inputmode="decimal">'
          +'<input class="log-inp" type="number" placeholder="reps" value="'+(entry.actual_reps||'')+'" oninput="logV(\''+k+'\',\'actual_reps\',this.value)" inputmode="numeric">'
          +'</div>'
          +'<div class="set-chk'+(entry.done?' done':'')+'" id="chk-'+k+'" onclick="toggleDone(\''+k+'\')">'+(entry.done?'✓':'')+'</div>'
          +'</div>';
      }
      html+='</div>';
      html+='</div>';// end ex-inner

      // Why
      if(hasWhy){
        var bt=Array.isArray(enr.sport_transfer)?enr.sport_transfer.find(function(t){return t.sport==='Baseball';}):null;
        var wid='why-'+id;
        html+='<button class="why-btn" onclick="toggleWhy(\''+wid+'\')">▸ Why this exercise</button>';
        html+='<div class="why-body" id="'+wid+'">';
        if(enr.mechanism_text) html+='<div class="why-mech">'+enr.mechanism_text+'</div>';
        if(bt) html+='<div class="why-xfer">⚾ '+bt.text+'</div>';
        html+='</div>';
      }

      html+='</div></div>'; // ex-detail, ex-card
    });
    html+='</div>'; // block-wrap
  });

  document.getElementById('session-area').innerHTML = html||'<div style="text-align:center;padding:40px;color:var(--text3);">Rest day</div>';
  updateRing();
}

function renderDayGrid(){
  var wi=STATE.week, days=PROG.weekData[wi].days;
  document.getElementById('day-grid').innerHTML=days.map(function(d,di){
    var off=d.type==='off';
    var exCnt=0; (d.blocks||[]).forEach(function(b){exCnt+=(b.exercises||[]).filter(function(e){return e.name;}).length;});
    var r=off?null:countDone(wi,di);
    return '<div class="day-btn'+(di===STATE.day&&!off?' active':'')+(off?' off':'')+'" onclick="'+(off?'':'selectDay('+di+')')+'">'
      +'<div class="dn">'+d.day+'</div>'
      +'<div class="dl">'+d.label+'</div>'
      +(off?'':exCnt?'<div class="dc">'+(r&&r.tot?r.done+'/'+r.tot:exCnt+' ex')+'</div>':'')
      +'</div>';
  }).join('');
}

function renderWeekTabs(){
  document.getElementById('week-tabs').innerHTML=PROG.weekData.map(function(wk,wi){
    return '<div class="wtab'+(wi===STATE.week?' active':'')+(wk.isDeload?' deload':'')+'" onclick="selectWeek('+wi+')">'
      +'Wk '+wk.week+(wk.isDeload?' · D':'')+'</div>';
  }).join('');
}

function selectWeek(wi){
  STATE.week=wi;
  var days=PROG.weekData[wi].days;
  var first=days.findIndex(function(d){
    return d.type!=='off'&&(d.blocks||[]).some(function(b){return(b.exercises||[]).some(function(e){return e.name;});});
  });
  STATE.day=first>=0?first:0;
  renderWeekTabs(); renderDayGrid(); renderSession();
}

function selectDay(di){
  STATE.day=di;
  renderDayGrid(); renderSession();
  document.getElementById('session-area').scrollIntoView({behavior:'smooth',block:'start'});
}

function toggleEx(id){
  var c=document.getElementById(id);
  if(c) c.classList.toggle('open');
}
function toggleWhy(id){
  var el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}
function logV(k,f,v){ if(!LOG[k])LOG[k]={}; LOG[k][f]=v; saveLog(); }
function toggleDone(k){
  if(!LOG[k])LOG[k]={}; LOG[k].done=!LOG[k].done;
  var el=document.getElementById('chk-'+k);
  if(el){el.classList.toggle('done',LOG[k].done);el.textContent=LOG[k].done?'✓':'';}
  saveLog(); updateRing(); renderDayGrid();
}
function completeDay(){
  var wi=STATE.week,di=STATE.day;
  var day=PROG.weekData[wi].days[di];
  (day.blocks||[]).forEach(function(b,bi_){
    (b.exercises||[]).filter(function(e){return e.name;}).forEach(function(ex,ei){
      var sets=parseInt(ex.sets)||1;
      for(var s=0;s<sets;s++){
        var k=lk(wi,di,bi_,ei,s);
        if(!LOG[k])LOG[k]={}; LOG[k].done=true;
        var el=document.getElementById('chk-'+k);
        if(el){el.classList.add('done');el.textContent='✓';}
      }
    });
  });
  saveLog(); updateRing(); renderDayGrid();
  var btn=document.querySelector('.done-btn');
  btn.textContent='✓ Day complete!';
  setTimeout(function(){btn.textContent='Mark day complete';},2000);
}

// ── Main render ────────────────────────────────────────────────
function render(){
  loadLog();
  var created=PROG.created_at?new Date(PROG.created_at).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}):'';
  document.getElementById('root').innerHTML=
    '<div class="hero">'
    +'<div class="hero-date">'+(created||'Cubs S&C')+'</div>'
    +'<div class="hero-name">'+(PROG.athlete||'Athlete')+'</div>'
    +'<div class="hero-prog">'+(PROG.name||'Training Program')+'</div>'
    +'</div>'
    +'<div class="week-tabs" id="week-tabs"></div>'
    +'<div class="day-grid" id="day-grid"></div>'
    +'<div class="session" id="session-area"></div>'
    +'<div class="bottom-bar">'
    +'<button class="done-btn" onclick="completeDay()">Mark day complete</button>'
    +'<button class="save-btn" onclick="saveLog();this.textContent=\'Saved!\';setTimeout(function(){this.textContent=\'💾 Save\';}.bind(this),1500)">💾 Save</button>'
    +'</div>';
  document.title=(PROG.athlete||'Cubs S&C')+' — '+(PROG.name||'Program');
  renderWeekTabs(); renderDayGrid(); renderSession();
}

// ── Load ───────────────────────────────────────────────────────
async function init(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){
    document.getElementById('root').innerHTML='<div class="err">No program ID in link.</div>';
    return;
  }

  try{
    var supa=window.supabase.createClient(SUPA_URL, SUPA_KEY);

    // Query
    var res=await supa.from('athlete_programs').select('*').eq('id',id).single();

    if(res.error){
      document.getElementById('root').innerHTML='<div class="err">Error loading program:<br>'+res.error.message+'<br><br>Code: '+res.error.code+'</div>';
      return;
    }
    if(!res.data){
      document.getElementById('root').innerHTML='<div class="err">Program not found (id: '+id+')</div>';
      return;
    }

    var prog=res.data;

    // Parse pb_state
    var pbState=null;
    try{
      if(prog.pb_state){
        pbState=typeof prog.pb_state==='string'?JSON.parse(prog.pb_state):prog.pb_state;
      }
    }catch(e){ console.error('pb_state parse error:',e); }

    if(!pbState||!pbState.weekData||!pbState.weekData.length){
      document.getElementById('root').innerHTML='<div class="err">Program has no week data.<br>Ask your coach to rebuild and reshare.</div>';
      return;
    }

    PROG={
      id:id,
      athlete: prog.athlete||'',
      name: prog.name||'',
      phase: prog.phase||'',
      created_at: prog.created_at||'',
      weekData: pbState.weekData
    };

    // Load enrichment (non-blocking)
    try{
      var er=await supa.from('exercises').select('name,muscle_group,muscle_head,bucket,mechanism_text,sport_transfer,video').not('mechanism_text','is',null);
      (er.data||[]).forEach(function(e){ ENRICH[e.name.toLowerCase()]=e; });
    }catch(e){}

    render();

  }catch(err){
    document.getElementById('root').innerHTML='<div class="err">Unexpected error:<br>'+err.message+'</div>';
    console.error(err);
  }
}

init();
</script>
</body>
</html>
